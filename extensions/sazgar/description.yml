extension:
  name: sazgar
  description: Comprehensive system monitoring - 20 table functions for CPU, memory, disk, network, processes, ports, services, Docker, GPU, and more
  version: 0.3.0
  language: Rust
  build: cargo
  license: MIT
  excluded_platforms: "wasm_mvp;wasm_eh;wasm_threads;windows_amd64_rtools;windows_amd64_mingw;linux_amd64_musl"
  requires_toolchains: "rust;python3"
  maintainers:
    - Angelerator

repo:
  github: Angelerator/Sazgar
  ref: 058721d1088fc72f7826099c92e5755b45406421

docs:
  hello_world: |
    -- Get comprehensive system overview (memory in MB by default)
    SELECT * FROM sazgar_system();

    -- Memory usage in GB
    SELECT * FROM sazgar_memory(unit := 'GB');

    -- Swap memory (GB by default)
    SELECT * FROM sazgar_swap();

    -- Per-core CPU usage
    SELECT * FROM sazgar_cpu_cores();

    -- Network traffic (MB by default)
    SELECT interface_name, rx, tx, unit FROM sazgar_network();

    -- Top memory processes (MB by default)
    SELECT pid, name, memory, unit FROM sazgar_processes() ORDER BY memory DESC LIMIT 5;

    -- Open network ports
    SELECT * FROM sazgar_ports('') WHERE local_port < 1024;
  extended_description: |
    Sazgar (Persian: سازگار, meaning "compatible/harmonious") is a comprehensive DuckDB extension for system resource monitoring with 20 table functions.

    **Functions with sensible defaults:**
    - `sazgar_system(unit:='MB')` - Complete system overview
    - `sazgar_memory(unit:='MB')` - RAM usage with unit conversion
    - `sazgar_swap(unit:='GB')` - Swap/virtual memory info
    - `sazgar_disks(unit:='GB')` - Disk usage
    - `sazgar_network(unit:='MB')` - Network interface statistics
    - `sazgar_processes(unit:='MB')` - Running processes
    - `sazgar_ports(filter)` - Open network ports and connections
    - `sazgar_os()` - Operating system information
    - `sazgar_cpu()` - CPU information
    - `sazgar_cpu_cores()` - Per-core CPU usage
    - `sazgar_services()` - System services (launchctl/systemd)
    - `sazgar_docker()` - Docker containers
    - `sazgar_load()` - System load averages
    - `sazgar_uptime()` - Detailed uptime information
    - `sazgar_users()` - System users
    - `sazgar_environment(filter)` - Environment variables
    - `sazgar_components()` - Temperature sensors
    - `sazgar_gpu()` - NVIDIA GPU info (optional)
    - `sazgar_fds(pid)` - File descriptors (Linux)
    - `sazgar_version()` - Extension version

    **Unit conversion** supports: bytes, KB, KiB, MB, MiB, GB, GiB, TB, TiB

    Cross-platform: Linux, macOS, Windows (full support), Android, iOS (partial support)

